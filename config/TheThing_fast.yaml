behaviors:
  TheThing:
    trainer_type: poca

    hyperparameters:
      batch_size: 512
      buffer_size: 5120
      learning_rate: 5.0e-4
      learning_rate_schedule: linear
      beta: 0.02
      beta_schedule: linear
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 5000
    threaded: true

# 밸런스 파라미터 (메인 config와 동일)
environment_parameters:
  total_distance: 1000.0
  ship_speed: 10.0
  ship_stop_threshold: 50.0
  sabotage_win_threshold: 30.0
  sabotage_damage: 10.0
  repair_amount: 15.0
  sabotage_time: 3.0
  repair_time: 5.0
  move_speed: 5.0
  vision_range: 10.0
  max_episode_time: 300.0
