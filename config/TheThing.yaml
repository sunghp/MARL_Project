behaviors:
  TheThing:
    trainer_type: poca

    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 0.01
      beta_schedule: linear
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0

    keep_checkpoints: 10
    checkpoint_interval: 200000
    max_steps: 10000000
    time_horizon: 128
    summary_freq: 10000
    threaded: true

# ===========================================
# 게임 밸런스 파라미터 (Unity에서 읽어감)
# yaml만 수정하면 재빌드 없이 밸런스 실험 가능
# ===========================================
environment_parameters:
  # 항해 설정
  total_distance: 1000.0
  ship_speed: 10.0

  # 시스템 안정도
  ship_stop_threshold: 50.0
  sabotage_win_threshold: 30.0

  # 상호작용
  sabotage_damage: 10.0
  repair_amount: 15.0
  sabotage_time: 3.0
  repair_time: 5.0

  # 이동/시야
  move_speed: 5.0
  vision_range: 10.0

  # 에피소드
  max_episode_time: 300.0
